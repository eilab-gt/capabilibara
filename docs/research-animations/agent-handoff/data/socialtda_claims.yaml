source_hierarchy:
- Latest submission PDF or explicitly supplied artifact is the source of truth for
  claims, values, caveats, and anonymity constraints.
- This file contains transcribed starter data for animation work. Preserve these
  scientific values unless a source artifact is added to the repo or a maintainer
  explicitly supplies updated values.
- GitHub repository is the source of truth for current web implementation and style
  tokens.
- When data artifacts are released later, data files supersede manually transcribed
  values below.
project:
  title: Where Does Social Reasoning Come From? Capability Provenance in Language
    Models
  short_name: SocialTDA / capability provenance
  core_question: Which regions of the pretraining corpus support social reasoning
    versus STEM reasoning in OLMo3-7B?
  core_pipeline:
  - Dolma3 corpus
  - WebOrganizer topic×format bins
  - TrackStar via Bergson attribution
  - 576×4 bin-level influence matrix
  - targeted unlearning validation
