unlearning:
  gamma_definition: γ = A_baseline − A_unlearned; positive values mean accuracy damage.
  paired_influence_vs_random:
    SocialIQA:
      n: 72
      median_d: 0.016
      ci:
      - 0.013
      - 0.022
      wilcoxon_p_bh: '1.0e-5'
      paired_t_p_bh: 0.022
      cohens_dz_pooled: 0.39
      verdict: clean paired result
    MMLU STEM:
      n: 72
      median_d: 0.002
      ci:
      - -0.0003
      - 0.0055
      wilcoxon_p_bh: 0.028
      paired_t_p_bh: 0.227
      cohens_dz_pooled: 0.23
      verdict: weaker evidence; CI crosses zero
    MMLU Social Sciences:
      n: 72
      median_d: 0.0017
      ci:
      - -0.0018
      - 0.0042
      wilcoxon_p_bh: 0.227
      verdict: not significant
    ARC-Challenge:
      n: 72
      median_d: -0.0026
      ci:
      - -0.0043
      - -0.0009
      wilcoxon_p_bh: '>0.99'
      verdict: reversed/noise-floor; influence-targeted slightly less damaging than
        random
  selectivity_formula: sel(b)=|γ(b)| / mean_{b'≠b}|γ(b')|; >1 means intended benchmark
    takes more damage than average collateral benchmark.
  cross_method_selectivity_verdict:
    SocialIQA: favorable in both bin-level and faithful per-document constructions
    MMLU STEM: favorable only under faithful per-document forget-sets
    MMLU Social Sciences: not favorable; agreeing loss
    ARC-Challenge: small-γ/noise-floor non-result
responsible_release:
  do_not_show_raw_training_text: true
  release_level: aggregate bin-level statistics and influence matrices rather than
    document-level scores
  claim_boundary:
  - Training-data attribution is approximate, not exact counterfactual tracing.
  - Unlearning validates load-bearing corpus regions, not full mechanisms or individual
    causal documents.
  - Claims are scoped to OLMo3-7B/Dolma3 and the stratified working set.
